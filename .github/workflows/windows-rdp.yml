name: Android Emulator - Official SDK Setup
on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: تثبيت المتطلبات الأساسية
        run: |
          sudo apt update
          sudo apt install -y wget curl unzip x11vnc xvfb novnc websockify openjdk-17-jdk jq

      # استخدام الأكشن الرسمي لتثبيت الـ SDK بدلاً من wget/curl
      - name: إعداد Android SDK تلقائياً
        uses: android-actions/setup-android@v3

      - name: تثبيت نظام Android 25 وإنشاء المحاكي
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-25" "system-images;android-25;google_apis;x86" "emulator"
          echo "no" | avdmanager create avd -n test_android -k "system-images;android-25;google_apis;x86" --force

      - name: تشغيل الشاشة الافتراضية و VNC
        run: |
          Xvfb :99 -screen 0 1024x768x16 &
          sleep 3
          export DISPLAY=:99
          x11vnc -display :99 -forever -shared -passwd 123456 -rfbport 5900 &
          websockify --web /usr/share/novnc 6080 localhost:5900 &

      - name: تشغيل المحاكي السريع (بدون تسريع عتادي)
        run: |
          export DISPLAY=:99
          
          emulator -avd test_android \
            -no-audio \
            -no-boot-anim \
            -accel off \
            -gpu swiftshader_indirect \
            -memory 1536 \
            -cores 2 \
            -no-snapshot-load &
            
          echo "⏳ انتظر دقيقتين لبدء تشغيل النظام والتحقق..."
          sleep 120
          adb devices

      - name: ربط وتشغيل ngrok
        run: |
          wget -q https://equinox.io
          tar -xzf ngrok-v3-stable-linux-amd64.tgz
          chmod +x ngrok
          ./ngrok authtoken 3G6Tklvvie4TlnfT4Pbm0MZIyZX_5UDFUwhjvvaHEXthqrEEA
          ./ngrok http 6080 > /dev/null &
          sleep 8
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels.public_url' > url.txt

      - name: روابط الاتصال والشاشة
        run: |
          echo "════════════════════════════════════════════════"
          if [ -f url.txt ] && [ -s url.txt ]; then
            URL=$(cat url.txt)
            echo "📌 رابط شاشة الأندرويد:"
            echo "${URL}/vnc_lite.html"
          fi
          echo "🔑 كلمة المرور: 123456"
          echo "════════════════════════════════════════════════"

      - name: الحفاظ على استمرار الجلسة
        run: |
          while true; do
            sleep 60
          done
