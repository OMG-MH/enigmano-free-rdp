name: Chrome Remote Desktop - Full Desktop in Browser

on:
  workflow_dispatch:
    inputs:
      instance_name:
        description: 'اسم الجهاز (اختياري)'
        required: false
        default: 'GitHub-Runner'
        type: string

jobs:
  crd:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install Google Chrome
        run: |
          Write-Host "📥 Installing Google Chrome..." -ForegroundColor Green
          choco install googlechrome -y
          Write-Host "✅ Chrome installed!" -ForegroundColor Green

      - name: Install Chrome Remote Desktop (Updated URL)
        run: |
          Write-Host "📥 Installing Chrome Remote Desktop..." -ForegroundColor Green
          # الرابط الصحيح والمحدث لتحميل Chrome Remote Desktop
          $crdUrl = "https://dl.google.com/remote/desktop/chromeremotedesktop.msi"
          # محاولة بديلة إذا فشل الرابط الأول
          try {
            Invoke-WebRequest -Uri $crdUrl -OutFile "crd.msi" -ErrorAction Stop
          } catch {
            Write-Host "⚠️ الرابط الأول فشل، نحاول رابط آخر..." -ForegroundColor Yellow
            $crdUrl = "https://dl.google.com/remote/desktop/chromeremotedesktop-64.msi"
            Invoke-WebRequest -Uri $crdUrl -OutFile "crd.msi"
          }
          Write-Host "📦 Installing MSI package..." -ForegroundColor Green
          Start-Process -FilePath "msiexec" -ArgumentList "/i crd.msi /quiet /norestart" -NoNewWindow -Wait
          Write-Host "✅ Chrome Remote Desktop installed!" -ForegroundColor Green

      - name: Start Chrome Remote Desktop Host
        run: |
          Write-Host "🚀 Starting Chrome Remote Desktop..." -ForegroundColor Green
          
          # الكود الذي نسخته من Google
          $code = "4/0AXEQxIA6psv6Ny71wLo3hPa1ZoVF9-8Cm6Yfo7NKuNfMoBo_WLyj2cJoOaaHrsLWDfyA1w"
          $name = "${{ github.event.inputs.instance_name }}" -replace " ", "-"
          if (-not $name) { $name = $Env:COMPUTERNAME }
          
          # التحقق من وجود الملف قبل التشغيل
          $hostExe = "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
          if (Test-Path $hostExe) {
            Write-Host "✅ Found host executable" -ForegroundColor Green
            & $hostExe --code="$code" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name="$name"
            Write-Host "✅ Chrome Remote Desktop is ready!" -ForegroundColor Green
          } else {
            Write-Host "❌ Host executable not found. Trying alternative path..." -ForegroundColor Red
            $hostExe = "${Env:PROGRAMFILES}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe"
            if (Test-Path $hostExe) {
              Write-Host "✅ Found host executable in alternative path" -ForegroundColor Green
              & $hostExe --code="$code" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name="$name"
              Write-Host "✅ Chrome Remote Desktop is ready!" -ForegroundColor Green
            } else {
              Write-Host "❌ Chrome Remote Desktop host not found. Installation may have failed." -ForegroundColor Red
              Write-Host "Please check the logs above for errors." -ForegroundColor Yellow
              exit 1
            }
          }

      - name: Display Connection Instructions
        run: |
          Write-Host "`n" -ForegroundColor White
          Write-Host "═══════════════════════════════════════════════════════════════" -ForegroundColor Cyan
          Write-Host "🖥️  CHROME REMOTE DESKTOP - سطح مكتب كامل في المتصفح" -ForegroundColor Green
          Write-Host "═══════════════════════════════════════════════════════════════" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "📌 خطوات الاتصال:" -ForegroundColor Yellow
          Write-Host "  1️⃣ افتح هذا الرابط في متصفحك:" -ForegroundColor White
          Write-Host "     👉 https://remotedesktop.google.com/access" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "  2️⃣ ستظهر قائمة بأجهزتك. ابحث عن هذا الجهاز:" -ForegroundColor White
          Write-Host "     📱 الاسم: ${{ github.event.inputs.instance_name }}" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "  3️⃣ انقر على الجهاز وانتظر ثوانٍ" -ForegroundColor White
          Write-Host "  4️⃣ ستظهر شاشة Windows Server كاملة في المتصفح!" -ForegroundColor Green
          Write-Host ""
          Write-Host "⚠️  مهم:" -ForegroundColor Red
          Write-Host "  - لا تغلق هذه النافذة (تبقي الجلسة نشطة)" -ForegroundColor Yellow
          Write-Host "  - يمكنك فتح عدة أجهزة بتشغيل Workflows متعددة" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "═══════════════════════════════════════════════════════════════" -ForegroundColor Cyan

      - name: Keep Session Alive
        run: |
          Write-Host "⏳ الجلسة نشطة - الحفاظ على الاتصال..." -ForegroundColor Green
          Write-Host "🔗 يمكنك الاتصال الآن من: https://remotedesktop.google.com/access" -ForegroundColor Yellow
          $counter = 0
          while ($true) {
            $counter++
            Write-Host "✓ Heartbeat #$counter - $(Get-Date -Format 'HH:mm:ss')" -ForegroundColor Gray
            Start-Sleep -Seconds 60
          }
