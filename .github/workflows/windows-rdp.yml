name: Android Emulator - Fast Version
on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: تثبيت المتطلبات الأساسية
        run: |
          sudo apt update
          sudo apt install -y wget curl unzip x11vnc xvfb novnc websockify openjdk-17-jdk jq

      - name: تحميل وتثبيت Android SDK Tools
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          # استخدام الرابط المباشر الصحيح والمستقر من جوجل
          curl -fo commandlinetools.zip https://google.com
          unzip -q commandlinetools.zip
          mkdir -p latest
          mv cmdline-tools/* latest/ 2>/dev/null || true
          rm -rf cmdline-tools commandlinetools.zip
          cd $HOME
          
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/emulator" >> $GITHUB_PATH


      - name: تثبيت نظام Android 25 الخفيف وإنشاء المحاكي
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses
          # استخدام نسخة x86 خفيفة من أندرويد 7.1.1
          sdkmanager "platform-tools" "platforms;android-25" "system-images;android-25;google_apis;x86" "emulator"
          echo "no" | avdmanager create avd -n test_android -k "system-images;android-25;google_apis;x86" -d "nexus_5" --force

      - name: تشغيل الشاشة الافتراضية و VNC
        run: |
          Xvfb :99 -screen 0 1024x768x16 &
          sleep 3
          export DISPLAY=:99
          x11vnc -display :99 -forever -shared -passwd 123456 -rfbport 5900 &
          websockify --web /usr/share/novnc 6080 localhost:5900 &

      - name: تشغيل المحاكي السريع (بدون تسريع عتادي)
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/platform-tools:$PATH
          export DISPLAY=:99
          
          # بارامترات مخصصة لسرعة الإقلاع وتقليل استهلاك الموارد
          emulator -avd test_android \
            -no-audio \
            -no-boot-anim \
            -accel off \
            -gpu swiftshader_indirect \
            -memory 1536 \
            -cores 2 \
            -no-snapshot-load &
            
          echo "⏳ انتظر دقيقتين لبدء تشغيل النظام..."
          sleep 120
          adb devices

      - name: ربط وتشغيل ngrok
        run: |
          wget -q https://equinox.io
          tar -xzf ngrok-v3-stable-linux-amd64.tgz
          chmod +x ngrok
          ./ngrok authtoken 3G6Tklvvie4TlnfT4Pbm0MZIyZX_5UDFUwhjvvaHEXthqrEEA
          ./ngrok http 6080 &
          sleep 8
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' > url.txt

      - name: روابط الاتصال والشاشة
        run: |
          echo "════════════════════════════════════════════════"
          if [ -f url.txt ] && [ -s url.txt ]; then
            URL=$(cat url.txt)
            echo "📌 رابط شاشة الأندرويد:"
            echo "${URL}/vnc_lite.html"
          fi
          echo "🔑 كلمة المرور: 123456"
          echo "════════════════════════════════════════════════"

      - name: الحفاظ على استمرار الجلسة
        run: |
          while true; do
            sleep 60
          done
