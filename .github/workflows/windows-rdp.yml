name: Android Server - High Speed Docker Version
on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: تثبيت المتطلبات ونظام البث
        run: |
          sudo apt update
          sudo apt install -y nodejs npm jq curl
          # تثبيت نظام تعجيل ومكتبات التحميل لنظام Docker المخصص للأندرويد
          sudo modprobe ashmem_linux || true
          sudo modprobe binder_linux || true

      - name: تشغيل نظام أندرويد الخفيف (Redroid)
        run: |
          # تشغيل أندرويد معالج برمجياً خفيف ومباشر بدون QEMU الثقيل
          docker run -d -p 5555:5555 --name redroid redroid/redroid:11.0.0-latest \
            androidboot.redroid_width=720 \
            androidboot.redroid_height=1280 \
            androidboot.redroid_dpi=320

      - name: إعداد بث الشاشة السريع (scrcpy-web)
        run: |
          # تشغيل خادم ويب لبث شاشة الأندرويد كفيديو سريع بدلاً من الـ VNC البطيء
          docker run -d --rm --name scrcpy-web --link redroid:redroid -p 6080:8000 srevinsaju/scrcpy-web:latest
          sleep 10

      - name: تشغيل نفق الاتصال السريع (Localtunnel)
        run: |
          sudo npm install -g localtunnel
          lt --port 6080 > url.txt &
          sleep 8

      - name: روابط الاتصال السريع
        run: |
          echo "════════════════════════════════════════════════"
          if [ -f url.txt ]; then
            LT_URL=$(cat url.txt | grep -o 'https://[^ ]*')
            echo "📌 رابط أندرويد السريع (افتحه في المتصفح):"
            echo "${LT_URL}"
          fi
          echo "════════════════════════════════════════════════"

      - name: استمرار الجلسة
        run: |
          while true; do
            sleep 60
          done
