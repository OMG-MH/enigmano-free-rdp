name: Chrome Remote Desktop - Full Desktop

on:
  workflow_dispatch:
    inputs:
      instance_name:
        description: 'اسم الجهاز'
        required: false
        default: 'GitHub-Runner'
        type: string

jobs:
  crd:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Install Google Chrome
        run: |
          Write-Host "📥 Installing Google Chrome..." -ForegroundColor Green
          choco install googlechrome -y
          Write-Host "✅ Chrome installed!" -ForegroundColor Green

      - name: Download Chrome Remote Desktop Host
        run: |
          Write-Host "📥 Downloading Chrome Remote Desktop Host..." -ForegroundColor Green
          $url = "https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi"
          curl.exe -L -o "crd.msi" $url
          if (-not (Test-Path "crd.msi")) {
            Write-Host "❌ Download failed!" -ForegroundColor Red
            exit 1
          }
          Write-Host "✅ Download successful!" -ForegroundColor Green

      - name: Install Chrome Remote Desktop
        run: |
          Write-Host "Installing Chrome Remote Desktop..." -ForegroundColor Green
          Start-Process -FilePath "msiexec" -ArgumentList "/i crd.msi /quiet /norestart" -NoNewWindow -Wait
          Write-Host "✅ Chrome Remote Desktop installed!" -ForegroundColor Green

      - name: Start Chrome Remote Desktop Host (with PIN)
        run: |
          Write-Host "🚀 Starting Chrome Remote Desktop with PIN..." -ForegroundColor Green
          
          # الكود الجديد الذي نسخته من Google
          $code = "4/0AXEQxIBgg6GzJvyE-vriAHZXUeiicZDAlYyg4U9Ah979wEidHjBovdpGzgARyTfJOAvMsw"
          
          # اسم الجهاز
          $name = "${{ github.event.inputs.instance_name }}" -replace " ", "-"
          if (-not $name) { $name = $Env:COMPUTERNAME }
          
          # رقم PIN من 6 أرقام (يمكنك تغييره)
          $pin = "123456"
          
          # الأمر مع --pin لحل المشكلة
          & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" `
            --code="$code" `
            --redirect-url="https://remotedesktop.google.com/_/oauthredirect" `
            --name="$name" `
            --pin="$pin"
          
          Write-Host "✅ Chrome Remote Desktop is ready!" -ForegroundColor Green
          Write-Host "🔑 PIN: $pin" -ForegroundColor Yellow

      - name: Display Connection Instructions
        run: |
          Write-Host "`n" -ForegroundColor White
          Write-Host "═══════════════════════════════════════════════════════════════" -ForegroundColor Cyan
          Write-Host "🖥️  CHROME REMOTE DESKTOP - سطح مكتب كامل في المتصفح" -ForegroundColor Green
          Write-Host "═══════════════════════════════════════════════════════════════" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "📌 خطوات الاتصال:" -ForegroundColor Yellow
          Write-Host "  1️⃣ افتح هذا الرابط في متصفحك:" -ForegroundColor White
          Write-Host "     👉 https://remotedesktop.google.com/access" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "  2️⃣ ستظهر قائمة بأجهزتك. ابحث عن هذا الجهاز:" -ForegroundColor White
          Write-Host "     📱 الاسم: ${{ github.event.inputs.instance_name }}" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "  3️⃣ انقر على الجهاز" -ForegroundColor White
          Write-Host "  4️⃣ أدخل الرقم السري (PIN): 123456" -ForegroundColor Yellow
          Write-Host "  5️⃣ ستظهر شاشة Windows Server كاملة في المتصفح!" -ForegroundColor Green
          Write-Host ""
          Write-Host "⚠️  مهم:" -ForegroundColor Red
          Write-Host "  - لا تغلق هذه النافذة (تبقي الجلسة نشطة)" -ForegroundColor Yellow
          Write-Host "  - يمكنك فتح عدة أجهزة بتشغيل Workflows متعددة" -ForegroundColor Yellow
          Write-Host ""
          Write-Host "═══════════════════════════════════════════════════════════════" -ForegroundColor Cyan

      - name: Keep Session Alive
        run: |
          Write-Host "⏳ الجلسة نشطة - الحفاظ على الاتصال..." -ForegroundColor Green
          Write-Host "🔗 يمكنك الاتصال الآن من: https://remotedesktop.google.com/access" -ForegroundColor Yellow
          $counter = 0
          while ($true) {
            $counter++
            Write-Host "✓ Heartbeat #$counter - $(Get-Date -Format 'HH:mm:ss')" -ForegroundColor Gray
            Start-Sleep -Seconds 60
          }
