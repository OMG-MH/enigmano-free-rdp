name: Android Remote Desktop - نهائي (ngrok v3 + token)

on:
  workflow_dispatch:
    inputs:
      instance_name:
        description: 'اسم الجهاز'
        required: false
        default: 'Android-Emulator'
        type: string

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: تثبيت المتطلبات الأساسية
        run: |
          sudo apt update
          sudo apt install -y wget curl unzip x11vnc xvfb fluxbox novnc websockify openjdk-11-jdk ssh jq

      - name: تثبيت Android SDK (الهيكل الصحيح)
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p latest
          mv cmdline-tools/* latest/ 2>/dev/null || true
          rm -rf cmdline-tools
          cd $HOME
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/emulator" >> $GITHUB_PATH

      - name: قبول التراخيص وتثبيت الصور وإنشاء AVD
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-30" "system-images;android-30;google_apis;x86_64"
          sdkmanager "emulator"
          echo "no" | avdmanager create avd -n my_android -k "system-images;android-30;google_apis;x86_64" -d "pixel_4"

      - name: إصلاح مسار صور النظام (رابط رمزي)
        run: |
          sudo mkdir -p /usr/local/lib/android/sdk
          sudo ln -sfn $HOME/android-sdk/system-images /usr/local/lib/android/sdk/system-images
          sudo ln -sfn $HOME/android-sdk/platform-tools /usr/local/lib/android/sdk/platform-tools
          sudo ln -sfn $HOME/android-sdk/emulator /usr/local/lib/android/sdk/emulator
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV

      - name: تشغيل المحاكي مع المسار المُصحَّح
        run: |
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          export PATH=$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/platform-tools:$PATH
          # تشغيل المحاكي مع تحديد sysdir صراحةً
          emulator -avd my_android -no-window -no-audio -gpu swiftshader_indirect -memory 2048 -sysdir $ANDROID_SDK_ROOT/system-images/android-30/google_apis/x86_64/ -verbose &
          sleep 120  # وقت كافٍ للإقلاع

      - name: بدء VNC و noVNC
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          export DISPLAY=:99
          fluxbox &
          sleep 2
          x11vnc -display :99 -forever -shared -passwd 123456 -rfbport 5900 &
          websockify --web /usr/share/novnc 6080 localhost:5900 &

      - name: تشغيل ngrok v3 مع التوكن
        run: |
          # تحميل ngrok الإصدار 3.x
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar -xzf ngrok-v3-stable-linux-amd64.tgz
          chmod +x ngrok
          # إضافة التوكن (استخدم التوكن الذي زودتني به)
          ./ngrok authtoken 3G6Tklvvie4TlnfT4Pbm0MZIyZX_5UDFUwhjvvaHEXthqrEEA
          # تشغيل النفق على المنفذ 6080
          ./ngrok http 6080 &
          sleep 10
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' > url.txt

      - name: عرض التعليمات
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "🖥️  ANDROID REMOTE DESKTOP - يعمل الآن ✅"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          if [ -f url.txt ] && [ -s url.txt ]; then
            echo "📌 رابط الاتصال (انسخه وافتحه في المتصفح):"
            cat url.txt
          else
            echo "⚠️ لم يتم العثور على الرابط، تحقق من سجلات ngrok"
          fi
          echo ""
          echo "🔑 كلمة مرور VNC: 123456"
          echo "⚠️  انتظر دقيقة إضافية حتى يكتمل إقلاع المحاكي"
          echo "═══════════════════════════════════════════════════════════════"

      - name: إبقاء الجلسة نشطة
        run: |
          echo "⏳ الجلسة نشطة لمدة 6 ساعات"
          while true; do
            echo "✓ Heartbeat $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            sleep 60
          done
