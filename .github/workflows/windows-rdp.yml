name: Android via Docker - VNC Remote Desktop

on:
  workflow_dispatch:
    inputs:
      instance_name:
        description: 'اسم الجهاز'
        required: false
        default: 'Android-Docker'
        type: string

jobs:
  android-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: تثبيت Docker (موجود مسبقاً لكن نضمن)
        run: |
          sudo apt update
          sudo apt install -y docker.io
          sudo systemctl start docker
          sudo docker --version

      - name: تشغيل حاوية أندرويد (صورة butomo/droid-vnc)
        run: |
          # سحب الصورة (حجمها ~1.5GB، قد يستغرق تحميلها 2-3 دقائق)
          sudo docker pull butomo/droid-vnc
          # تشغيل الحاوية مع تعيين المنافذ
          sudo docker run -d --name android -p 5900:5900 -p 6080:6080 butomo/droid-vnc
          # انتظار إقلاع أندرويد
          sleep 30

      - name: تشغيل noVNC (إذا لم يكن مدمجاً)
        run: |
          # الصورة تحتوي على noVNC على المنفذ 6080، لكن نتحقق ونديره يدوياً إن لزم
          # ننتظر حتى يصبح الخادم جاهزاً
          sleep 10
          echo "✅ خادم VNC يعمل على المنفذ 5900، و noVNC على 6080"

      - name: تشغيل ngrok مع التوكن
        run: |
          wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
          tar -xzf ngrok-v3-stable-linux-amd64.tgz
          chmod +x ngrok
          ./ngrok authtoken 3G6Tklvvie4TlnfT4Pbm0MZIyZX_5UDFUwhjvvaHEXthqrEEA
          ./ngrok http 6080 &
          sleep 10
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' > url.txt

      - name: عرض رابط الاتصال
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "📱  ANDROID VIA DOCKER - جاهز للاستخدام ✅"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          if [ -f url.txt ] && [ -s url.txt ]; then
            URL=$(cat url.txt)
            echo "📌 رابط الوصول إلى أندرويد (افتحه في المتصفح):"
            echo "${URL}/vnc.html"
          fi
          echo ""
          echo "🔑 كلمة المرور: (لا توجد كلمة مرور – فارغة)"
          echo "⏳ انتظر 30 ثانية إضافية حتى يظهر سطح المكتب"
          echo "⚠️  يمكنك أيضاً استخدام أي عميل VNC على المنفذ 5900"
          echo "═══════════════════════════════════════════════════════════════"

      - name: إبقاء الجلسة نشطة
        run: |
          while true; do
            echo "✓ Heartbeat $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            sleep 60
          done
