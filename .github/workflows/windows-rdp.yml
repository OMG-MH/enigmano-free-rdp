name: Android Emulator - Ultimate Fixed
on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: تثبيت المتطلبات الأساسية والنظام
        run: |
          sudo apt update
          sudo apt install -y wget curl unzip x11vnc xvfb novnc websockify openjdk-17-jdk jq nodejs npm

      - name: إعداد Android SDK تلقائياً
        uses: android-actions/setup-android@v3

      - name: تثبيت نظام Android 25 وإنشاء المحاكي
        run: |
          # تحديد مسار الـ AVD بشكل صارم ليقرأه النظام في الخطوات القادمة
          mkdir -p $HOME/.android/avd
          echo "ANDROID_AVD_HOME=$HOME/.android/avd" >> $GITHUB_ENV
          
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-25" "system-images;android-25;google_apis;x86" "emulator"
          
          # إنشاء المحاكي مباشرة داخل المسار الذي يفضله النظام
          export ANDROID_AVD_HOME=$HOME/.android/avd
          echo "no" | avdmanager create avd -n test_android -k "system-images;android-25;google_apis;x86" --force

      - name: تشغيل الشاشة الافتراضية و VNC
        run: |
          Xvfb :99 -screen 0 1024x768x16 &
          sleep 3
          export DISPLAY=:99
          x11vnc -display :99 -forever -shared -passwd 123456 -rfbport 5900 &
          websockify --web /usr/share/novnc 6080 localhost:5900 &

      - name: تشغيل المحاكي السريع وتثبيت المسارات
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export PATH=$ANDROID_HOME/emulator:$ANDROID_HOME/platform-tools:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          export ANDROID_AVD_HOME=$HOME/.android/avd
          export DISPLAY=:99
          
          emulator -avd test_android \
            -no-audio \
            -no-boot-anim \
            -accel off \
            -gpu swiftshader_indirect \
            -memory 1536 \
            -cores 2 \
            -no-snapshot-load &
            
          echo "⏳ انتظر دقيقتين لبدء تشغيل النظام والتحقق..."
          sleep 120
          adb devices

      - name: تشغيل نفق الاتصال البديل (Localtunnel)
        run: |
          sudo npm install -g localtunnel
          lt --port 6080 > url.txt &
          sleep 8
          cat url.txt

      - name: روابط الاتصال والشاشة
        run: |
          echo "════════════════════════════════════════════════"
          if [ -f url.txt ]; then
            LT_URL=$(cat url.txt | grep -o 'https://[^ ]*')
            echo "📌 رابط شاشة الأندرويد الجديد:"
            echo "${LT_URL}/vnc_lite.html"
          fi
          echo "🔑 كلمة المرور: 123456"
          echo "════════════════════════════════════════════════"

      - name: الحفاظ على استمرار الجلسة
        run: |
          while true; do
            sleep 60
          done
