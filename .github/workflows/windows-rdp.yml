name: RDP via Cloudflare Tunnel (Free)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Setup Cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Enable RDP and Allow Multiple Sessions
        run: |
          Write-Host "Enabling Remote Desktop..." -ForegroundColor Green
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
          # السماح بجلسات متعددة
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server' -Name 'fSingleSessionPerUser' -Value 0
          Restart-Service -Name TermService -Force
          Write-Host "✅ RDP Enabled Successfully!"

      - name: Set Password
        run: |
          Write-Host "Setting up user account..." -ForegroundColor Green
          $Password = ConvertTo-SecureString "P@ssw0rd123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin"
          Write-Host "Username: runneradmin" -ForegroundColor Yellow
          Write-Host "Password: P@ssw0rd123!" -ForegroundColor Yellow

      - name: Start Cloudflare Tunnel
        id: tunnel
        run: |
          Write-Host "Starting Cloudflare Tunnel..." -ForegroundColor Green
          $logFile = "C:\cloudflared.log"
          # تشغيل cloudflared في الخلفية مع تسجيل المخرجات
          Start-Process -FilePath "cloudflared" -ArgumentList "tunnel --url tcp://localhost:3389 --logfile $logFile" -NoNewWindow -RedirectStandardOutput "C:\cloudflared_output.log"
          
          Write-Host "⏳ Waiting for tunnel to establish..." -ForegroundColor Yellow
          $retries = 30
          $url = $null
          for ($i = 1; $i -le $retries; $i++) {
            Start-Sleep -Seconds 2
            if (Test-Path $logFile) {
              $content = Get-Content $logFile -Raw -ErrorAction SilentlyContinue
              if ($content -match 'https://([a-zA-Z0-9-]+)\.trycloudflare\.com') {
                $url = "https://$($Matches[1]).trycloudflare.com"
                break
              }
              # محاولة من المخرجات القياسية
              $output = Get-Content "C:\cloudflared_output.log" -Raw -ErrorAction SilentlyContinue
              if ($output -match 'https://([a-zA-Z0-9-]+)\.trycloudflare\.com') {
                $url = "https://$($Matches[1]).trycloudflare.com"
                break
              }
            }
            Write-Host "   Attempt $i / $retries ..." -ForegroundColor Gray
          }

          if ($url) {
            echo "tunnel_url=$url" >> $env:GITHUB_OUTPUT
            Write-Host "✅ TUNNEL URL FOUND:" -ForegroundColor Green
            Write-Host "👉 $url" -ForegroundColor Cyan
          } else {
            Write-Host "❌ Could not extract URL automatically." -ForegroundColor Red
            echo "tunnel_url=NOT_FOUND" >> $env:GITHUB_OUTPUT
            Write-Host "Last 20 lines of cloudflared log:" -ForegroundColor Yellow
            Get-Content $logFile -Tail 20
          }

      - name: Display Connection Details
        run: |
          $url = "${{ steps.tunnel.outputs.tunnel_url }}"
          Write-Host "`n==============================================" -ForegroundColor Cyan
          Write-Host "🖥️  RDP TUNNEL ACTIVE" -ForegroundColor Green
          Write-Host "==============================================" -ForegroundColor Cyan
          if ($url -ne "NOT_FOUND") {
            Write-Host "👉 USE THIS URL:" -ForegroundColor Yellow
            Write-Host "   $url" -ForegroundColor White
            Write-Host ""
            Write-Host "🔧 CONNECT WITH THIS COMMAND (run locally):" -ForegroundColor Yellow
            Write-Host "   cloudflared access tcp --hostname $url --url localhost:3389" -ForegroundColor White
            Write-Host ""
            Write-Host "📋 Then open Remote Desktop Connection (mstsc) and connect to:" -ForegroundColor Yellow
            Write-Host "   localhost:3389" -ForegroundColor White
          } else {
            Write-Host "⚠️  URL not found automatically. Check logs above." -ForegroundColor Red
          }
          Write-Host "----------------------------------------------" -ForegroundColor Cyan
          Write-Host "👤 Username: runneradmin" -ForegroundColor Yellow
          Write-Host "🔑 Password: P@ssw0rd123!" -ForegroundColor Yellow
          Write-Host "==============================================" -ForegroundColor Cyan

      - name: Keep Session Alive
        run: |
          Write-Host "⏳ Session Active - Keeping alive..." -ForegroundColor Green
          while ($true) {
            Start-Sleep -Seconds 60
            Write-Host "✓ Active - $(Get-Date -Format 'HH:mm:ss')"
          }
