name: Android Remote Desktop - Serveo (بدون ngrok)

on:
  workflow_dispatch:
    inputs:
      instance_name:
        description: 'اسم الجهاز'
        required: false
        default: 'Android-Emulator'
        type: string

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: تثبيت المتطلبات الأساسية
        run: |
          sudo apt update
          sudo apt install -y wget curl unzip x11vnc xvfb fluxbox novnc websockify openjdk-11-jdk ssh jq

      - name: تثبيت Android SDK - الهيكل الصحيح
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mkdir -p latest
          mv cmdline-tools/* latest/ 2>/dev/null || true
          rm -rf cmdline-tools
          cd $HOME
          # تعيين المتغيرات الأساسية فقط (بدون AVD_HOME لنستخدم المسار الافتراضي)
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/emulator" >> $GITHUB_PATH
          # تحقق
          ls -la $HOME/android-sdk/cmdline-tools/latest/bin/

      - name: قبول التراخيص وتثبيت الصور وإنشاء AVD (بالمسار الافتراضي)
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-30" "system-images;android-30;google_apis;x86_64"
          sdkmanager "emulator"
          # إنشاء AVD بدون تحديد مسار (سيُخزن في ~/.android/avd)
          echo "no" | avdmanager create avd -n my_android -k "system-images;android-30;google_apis;x86_64" -d "pixel_4"

      - name: تشغيل المحاكي
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/platform-tools:$PATH
          # تأكد من وجود AVD في المسار الافتراضي
          echo "AVD موجودة في:"
          ls -la ~/.android/avd/
          emulator -avd my_android -no-window -no-audio -gpu swiftshader_indirect -memory 2048 -verbose &
          sleep 120  # وقت كافٍ للإقلاع

      - name: بدء VNC و noVNC
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          export DISPLAY=:99
          fluxbox &
          sleep 2
          x11vnc -display :99 -forever -shared -passwd 123456 -rfbport 5900 &
          websockify --web /usr/share/novnc 6080 localhost:5900 &

      - name: تشغيل Serveo والحصول على الرابط
        run: |
          # تشغيل ssh في الخلفية مع حفظ المخرجات في ملف مؤقت
          ssh -o StrictHostKeyChecking=no -R 80:localhost:6080 serveo.net -N > serveo.log 2>&1 &
          sleep 10
          # استخراج الرابط من الملف
          URL=$(grep -o 'https://[^ ]*\.serveo\.net' serveo.log | head -1)
          if [ -n "$URL" ]; then
            echo "$URL" > url.txt
            echo "✅ تم الحصول على الرابط: $URL"
          else
            echo "⚠️ لم يتم العثور على الرابط بعد، حاول مرة أخرى يدوياً من السجلات"
            # عرض آخر سطور الملف للمساعدة
            tail -20 serveo.log
          fi

      - name: عرض التعليمات
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "🖥️  ANDROID REMOTE DESKTOP - يعمل بدون ngrok ✅"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          if [ -f url.txt ]; then
            echo "📌 رابط الاتصال (انسخه وافتحه في المتصفح):"
            cat url.txt
          else
            echo "📌 ابحث في السجلات (Logs) عن كلمة 'serveo.net'"
            echo "   ستجد رابطاً مشابهاً لـ: https://xxxx.serveo.net"
          fi
          echo ""
          echo "🔑 كلمة مرور VNC: 123456"
          echo "⚠️  انتظر دقيقة إضافية حتى يكتمل إقلاع المحاكي"
          echo "═══════════════════════════════════════════════════════════════"

      - name: إبقاء الجلسة نشطة
        run: |
          echo "⏳ الجلسة نشطة لمدة 6 ساعات"
          while true; do
            echo "✓ Heartbeat $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            sleep 60
          done
