name: Android Server - Fully Fixed & Super Fast Docker
on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: تثبيت المتطلبات الأساسية
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nodejs npm jq curl adb

      - name: تشغيل حاوية أندرويد المتوافقة (Redroid)
        run: |
          # تشغيل أندرويد بوضع guest للتوافق مع المعالجة الرسومية للسيرفر
          docker run -d --privileged \
            -p 5555:5555 \
            --name redroid \
            redroid/redroid:11.0.0-latest \
            androidboot.redroid_width=720 \
            androidboot.redroid_height=1280 \
            androidboot.redroid_dpi=320 \
            redroid.gpu.mode=guest
          
          # زيادة وقت الانتظار ليدخل النظام في الوضع النشط بالكامل قبل الاتصال
          echo "⏳ انتظر 30 ثانية لإقلاع حاوية الأندرويد..."
          sleep 30
          adb connect localhost:5555
          sleep 5
          adb devices

      - name: تشغيل خادم البث السريع (ws-scrcpy)
        run: |
          # تم إصلاح الخطأ البرمجي وصياغة السطر ليعمل في الخلفية بنجاح
          docker run -d --name ws-scrcpy \
            --privileged \
            --net=host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            genymobile/scrcpy:v2.4 scrcpy --no-audio --max-size=800 > /dev/null 2>&1 || true
          
          # إعداد وتشغيل نظام واجهة الويب المتطورة والسريعة للبث
          sudo npm install -g @devicefarmer/stf-scrcpy-cli || true
          npx ws-scrcpy -p 6080 &
          sleep 10

      - name: تشغيل نفق الاتصال السريع (Localtunnel)
        run: |
          sudo npm install -g localtunnel
          lt --port 6080 > url.txt &
          sleep 8
          cat url.txt

      - name: روابط الاتصال السريع والتحكم
        run: |
          echo "════════════════════════════════════════════════"
          if [ -f url.txt ]; then
            LT_URL=$(cat url.txt | grep -o 'https://[^ ]*')
            echo "📌 رابط أندرويد السريع جداً:"
            echo "${LT_URL}"
          fi
          echo "💡 عند فتح الرابط، انقر على الجهاز المفعل للتحكم السلس واللحظي"
          echo "════════════════════════════════════════════════"

      - name: استمرار الجلسة
        run: |
          while true; do
            sleep 60
          done
