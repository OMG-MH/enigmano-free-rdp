name: EnigMano Instance Deployment (Fixed)

on:
  workflow_dispatch:
    inputs:
      instance_number:
        description: 'رقم النسخة (1-10)'
        required: true
        default: '1'
        type: string

jobs:
  deploy-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: System Information
        run: |
          Write-Host "=== ENIGMANO RDP DEPLOYMENT ===" -ForegroundColor Green
          Write-Host "Instance Number: ${{ github.event.inputs.instance_number }}" -ForegroundColor Yellow
          Write-Host "Runner: $env:RUNNER_NAME" -ForegroundColor Yellow
          Write-Host "Workflow: $env:GITHUB_WORKFLOW" -ForegroundColor Yellow
          Write-Host "`n=== SYSTEM SPECIFICATIONS ===" -ForegroundColor Cyan
          Get-ComputerInfo | Select-Object WindowsProductName, WindowsVersion, TotalPhysicalMemory
          Get-WmiObject -Class Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors

      - name: Enable RDP
        run: |
          Write-Host "Enabling Remote Desktop..." -ForegroundColor Green
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1

      - name: Create User Account
        run: |
          Write-Host "Setting up user account..." -ForegroundColor Green
          $Password = ConvertTo-SecureString "P@ssw0rd!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "runneradmin"
          Write-Host "Username: runneradmin" -ForegroundColor Yellow
          Write-Host "Password: P@ssw0rd!" -ForegroundColor Yellow

      - name: Download and Setup ngrok
        run: |
          Write-Host "Downloading ngrok..." -ForegroundColor Green
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
          Expand-Archive ngrok.zip -DestinationPath C:\ngrok

      - name: Configure ngrok
        run: |
          Write-Host "Configuring ngrok..." -ForegroundColor Green
          C:\ngrok\ngrok.exe config add-authtoken ${{ secrets.NGROK_SHAHZAIB }}

      - name: Install Essential Software (Optional)
        run: |
          Write-Host "Installing essential software..." -ForegroundColor Green
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          choco install googlechrome -y
          choco install 7zip -y
          choco install notepadplusplus -y
          Write-Host "Software installation completed!" -ForegroundColor Green

      - name: Start ngrok Tunnel (Improved)
        id: start_ngrok
        run: |
          Write-Host "Starting ngrok tunnel with logging..." -ForegroundColor Green
          # تشغيل ngrok مع تسجيل المخرجات إلى ملف
          $ngrokLog = "C:\ngrok.log"
          Start-Process -FilePath "C:\ngrok\ngrok.exe" -ArgumentList "tcp 3389 --log=stdout" -NoNewWindow -RedirectStandardOutput $ngrokLog
          Write-Host "ngrok process started. Waiting for it to be ready..." -ForegroundColor Yellow
          
          # الانتظار حتى يصبح المنفذ 4040 مفتوحاً (واجهة برمجة التطبيقات)
          $maxRetries = 30
          $retryCount = 0
          $apiReady = $false
          while ($retryCount -lt $maxRetries -and -not $apiReady) {
            Start-Sleep -Seconds 2
            $retryCount++
            try {
              $test = Test-NetConnection -ComputerName 127.0.0.1 -Port 4040 -InformationLevel Quiet
              if ($test) {
                $apiReady = $true
                Write-Host "✅ ngrok API is ready on port 4040 (after $retryCount attempts)." -ForegroundColor Green
                break
              }
            } catch {
              # تجاهل الأخطاء
            }
            Write-Host "   Attempt $retryCount/$maxRetries: Waiting for ngrok API..." -ForegroundColor Gray
          }
          
          if (-not $apiReady) {
            Write-Host "❌ ngrok API did not become ready. Displaying log:" -ForegroundColor Red
            Get-Content $ngrokLog -Tail 20
            exit 1
          }

      - name: Get Connection Details
        run: |
          Write-Host "`n=== CONNECTION DETAILS ===" -ForegroundColor Green
          $maxRetries = 5
          $retryCount = 0
          $tunnelInfo = $null
          while ($retryCount -lt $maxRetries -and -not $tunnelInfo) {
            Start-Sleep -Seconds 2
            $retryCount++
            try {
              $ngrokApi = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -TimeoutSec 5
              if ($ngrokApi.tunnels.Count -gt 0) {
                $tunnelInfo = $ngrokApi.tunnels[0]
                break
              }
            } catch {
              Write-Host "   Attempt $retryCount/$maxRetries: Could not get tunnel info..." -ForegroundColor Gray
            }
          }
          
          if ($tunnelInfo) {
            $publicUrl = $tunnelInfo.public_url
            $host = $publicUrl -replace "tcp://", ""
            Write-Host "╔══════════════════════════════════════╗" -ForegroundColor Cyan
            Write-Host "║         ENIGMANO RDP ACCESS          ║" -ForegroundColor Cyan
            Write-Host "╠══════════════════════════════════════╣" -ForegroundColor Cyan
            Write-Host "║ Host: $host" -ForegroundColor White
            Write-Host "║ Username: runneradmin                ║" -ForegroundColor White
            Write-Host "║ Password: P@ssw0rd!                  ║" -ForegroundColor White
            Write-Host "╚══════════════════════════════════════╝" -ForegroundColor Cyan
            Write-Host "`n🔧 Connection Instructions:" -ForegroundColor Yellow
            Write-Host "1. Open Remote Desktop Connection (mstsc)" -ForegroundColor White
            Write-Host "2. Enter the host address above" -ForegroundColor White
            Write-Host "3. Use the provided credentials" -ForegroundColor White
            Write-Host "4. IMPORTANT: Minimize (don't close) this window to keep connection alive!" -ForegroundColor Red
          } else {
            Write-Host "❌ Could not retrieve tunnel information." -ForegroundColor Red
            Write-Host "Last 10 lines of ngrok log:" -ForegroundColor Yellow
            Get-Content "C:\ngrok.log" -Tail 10
          }

      - name: Keep Session Alive
        run: |
          Write-Host "`n=== SESSION ACTIVE ===" -ForegroundColor Green
          Write-Host "EnigMano RDP instance is now running!" -ForegroundColor Cyan
          Write-Host "Instance will remain active for up to 6 hours." -ForegroundColor Yellow
          Write-Host "Do not close this window to maintain the connection." -ForegroundColor Red
          $counter = 0
          while ($true) {
            $counter++
            Write-Host "Session active - Heartbeat #$counter ($(Get-Date))" -ForegroundColor Green
            # تحقق من ngrok كل 5 دقائق وأعد التشغيل إذا لزم الأمر
            if ($counter % 5 -eq 0) {
              try {
                $ngrokStatus = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -TimeoutSec 5 -ErrorAction Stop
                if ($ngrokStatus.tunnels.Count -gt 0) {
                  Write-Host "ngrok tunnel status: ACTIVE" -ForegroundColor Green
                } else {
                  Write-Host "ngrok tunnel status: NO TUNNELS" -ForegroundColor Yellow
                }
              } catch {
                Write-Host "ngrok tunnel status: ERROR - Attempting restart..." -ForegroundColor Red
                # قتل أي عملية ngrok قديمة
                taskkill /F /IM ngrok.exe 2>$null
                Start-Sleep -Seconds 3
                # إعادة تشغيل ngrok
                Start-Process -FilePath "C:\ngrok\ngrok.exe" -ArgumentList "tcp 3389 --log=stdout" -NoNewWindow -RedirectStandardOutput "C:\ngrok.log"
              }
            }
            Start-Sleep -Seconds 60
          }
