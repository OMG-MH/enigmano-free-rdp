name: Android Remote Desktop - Serveo (بدون ngrok)

on:
  workflow_dispatch:
    inputs:
      instance_name:
        description: 'اسم الجهاز'
        required: false
        default: 'Android-Emulator'
        type: string

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: تثبيت المتطلبات الأساسية
        run: |
          sudo apt update
          sudo apt install -y wget curl unzip x11vnc xvfb fluxbox novnc websockify openjdk-11-jdk ssh jq

      - name: تثبيت Android SDK - هيكل cmdline-tools/latest
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          # now we have cmdline-tools/ directory, move to latest/
          mkdir -p latest
          mv cmdline-tools/* latest/ 2>/dev/null || true
          rm -rf cmdline-tools
          cd $HOME
          # set environment variables
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_AVD_HOME=$HOME/android-sdk/avd" >> $GITHUB_ENV
          echo "ANDROID_EMULATOR_HOME=$HOME/android-sdk/emulator" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/emulator" >> $GITHUB_PATH
          # verify
          ls -la $HOME/android-sdk/cmdline-tools/latest/bin/

      - name: قبول التراخيص وتثبيت الصور وإنشاء AVD
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-30" "system-images;android-30;google_apis;x86_64"
          sdkmanager "emulator"
          # إنشاء AVD مع تحديد المسار الكامل للصورة
          echo "no" | avdmanager create avd -n my_android -k "system-images;android-30;google_apis;x86_64" -d "pixel_4" -p $HOME/android-sdk/avd

      - name: تشغيل المحاكي مع المتغيرات الصحيحة
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export ANDROID_AVD_HOME=$HOME/android-sdk/avd
          export ANDROID_EMULATOR_HOME=$HOME/android-sdk/emulator
          export PATH=$ANDROID_SDK_ROOT/emulator:$ANDROID_SDK_ROOT/platform-tools:$PATH
          # تحقق من وجود ملف AVD
          ls -la $ANDROID_AVD_HOME
          # تشغيل المحاكي مع -avd و -verbose لمشاهدة الأخطاء
          emulator -avd my_android -no-window -no-audio -gpu swiftshader_indirect -memory 2048 -verbose &
          sleep 100  # وقت كافٍ للإقلاع

      - name: بدء VNC و noVNC
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          export DISPLAY=:99
          fluxbox &
          sleep 2
          x11vnc -display :99 -forever -shared -passwd 123456 -rfbport 5900 &
          websockify --web /usr/share/novnc 6080 localhost:5900 &

      - name: تشغيل Serveo (بدون حساب، بدون توكن)
        run: |
          # نستخدم ssh لإنشاء نفق على المنفذ 6080
          ssh -o StrictHostKeyChecking=no -R 80:localhost:6080 serveo.net -N &
          sleep 10
          # نجلب الرابط من مخرجات serveo عبر curl (محاولة)
          echo "🔗 الرابط سيظهر في السجلات أعلاه (ابحث عن https://xxxx.serveo.net)"
          # نحاول استخراج الرابط من منفذ 4040 (إذا كان serveo يوفر واجهة API)
          curl -s http://localhost:4040/api/tunnels 2>/dev/null | jq -r '.tunnels[0].public_url' > url.txt || echo "⚠️ انتظر ثم ابحث في السجلات عن الرابط"

      - name: عرض التعليمات
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "🖥️  ANDROID REMOTE DESKTOP - يعمل بدون ngrok ✅"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "📌 ابحث في السجلات (Logs) عن كلمة 'serveo.net'"
          echo "   ستجد رابطاً مشابهاً لـ: https://xxxx.serveo.net"
          echo ""
          echo "🔑 كلمة مرور VNC: 123456"
          echo "⚠️  انتظر دقيقة إضافية حتى يكتمل إقلاع المحاكي"
          echo "═══════════════════════════════════════════════════════════════"

      - name: إبقاء الجلسة نشطة
        run: |
          echo "⏳ الجلسة نشطة لمدة 6 ساعات"
          while true; do
            echo "✓ Heartbeat $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            sleep 60
          done
